<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | LyricsHubIndia</title>
  <meta name="description" content="Get in touch with LyricsHubIndia.">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="glass">
    <div class="container nav-wrapper">
      <nav>
        <a href="index.html" class="logo">LyricsHub<span style="color:#FFF">India</span></a>
        <div class="nav-links">
          <a href="index.html">Home</a>
          <a href="about.html">About</a>
          <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Theme">
            <i class="fas fa-moon"></i>
          </button>
        </div>
      </nav>
    </div>
  </header>

  <main class="container section">
    <div class="page-content glass animate">
      <h1 style="font-size: 2.5rem; margin-bottom: 1.5rem; background: linear-gradient(to right, #FFF, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Contact Us</h1>
      <p style="margin-bottom: 2rem;">We love hearing from our community! Whether you have a song request, feedback, business inquiry, or a DMCA notice, drop us a message below.</p>
      
      <form action="#" method="POST" style="max-width: 600px;">
        <div class="form-group">
          <label class="form-label" for="name">Your Name</label>
          <input type="text" id="name" class="form-control" required placeholder="John Doe">
        </div>
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input type="email" id="email" class="form-control" required placeholder="john@example.com">
        </div>
        <div class="form-group">
          <label class="form-label" for="subject">Subject</label>
          <input type="text" id="subject" class="form-control" required placeholder="Feedback / Inquiry">
        </div>
        <div class="form-group">
          <label class="form-label" for="message">Message</label>
          <textarea id="message" class="form-control" rows="6" required placeholder="How can we help you?"></textarea>
        </div>
        <button type="submit" class="btn-primary">Send Message</button>
      </form>
    </div>
  </main>

  <footer class="glass" style="margin-top:auto;">
    <div class="container" style="text-align:center; padding: 2rem 0;">
      <p>© 2026 LyricsHubIndia. All Rights Reserved.</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
